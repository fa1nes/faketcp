name: build-openwrt-mimic

# 用 ImmortalWrt/OpenWrt 官方 SDK 编译 mimic 的 ipk（含 BPF，kprobe），发布到 openwrt Release。
# 默认针对 ImmortalWrt 24.10.4 x86/64；换设备时改下方 base 为你的 SDK 目录 URL。
# 触发：手动 或 每日定时。

on:
  workflow_dispatch:
    inputs:
      base:
        description: "SDK 所在目录 URL（release targets 目录）"
        default: "https://downloads.immortalwrt.org/releases/24.10.4/targets/x86/64"
        required: false
  schedule:
    - cron: "20 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: install host toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget zstd

      - name: download SDK
        env:
          BASE: ${{ github.event.inputs.base }}
        run: |
          BASE="${BASE:-https://downloads.immortalwrt.org/releases/24.10.4/targets/x86/64}"
          FILE="$(curl -fsSL "$BASE/" | grep -oE '(immortalwrt|openwrt)-sdk-[^"<]*\.tar\.(xz|zst)' | head -n1)"
          [ -n "$FILE" ] || { echo "找不到 SDK 文件"; exit 1; }
          echo "SDK: $FILE"
          curl -fsSL "$BASE/$FILE" -o "$FILE"
          mkdir sdk
          tar -C sdk --strip-components=1 -xaf "$FILE"

      - name: build ipk
        run: |
          cd sdk
          echo "src-git mimic https://github.com/hack3ric/mimic;openwrt" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install mimic
          make defconfig
          make package/mimic/compile V=s
          find bin -name 'mimic_*.ipk'
          cp "$(find bin -name 'mimic_*.ipk' | head -n1)" ../mimic-openwrt-x86_64.ipk

      - name: publish to openwrt release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openwrt
          name: openwrt/immortalwrt
          files: mimic-openwrt-*.ipk

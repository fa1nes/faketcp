name: build-alpine-mimic

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "mimic upstream branch or tag (empty = latest tag)"
        default: ""
        required: false
      force:
        description: "force rebuild even if version unchanged"
        default: "false"
        required: false
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: resolve upstream version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REF="${{ github.event.inputs.ref }}"
          [ -n "$REF" ] || REF="$(git ls-remote --tags --refs --sort=-v:refname \
            https://github.com/hack3ric/mimic 'v*' | head -n1 | sed 's#.*/##')"
          [ -n "$REF" ] || REF="master"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          SKIP=false
          if [ "${{ github.event.inputs.force }}" != "true" ]; then
            CUR="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/alpine" \
              2>/dev/null | grep -o '"name": *"[^"]*"' | head -n1 | cut -d'"' -f4)"
            [ "$CUR" = "alpine $REF" ] && SKIP=true
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: build in alpine container
        if: steps.ver.outputs.skip != 'true'
        env:
          REF: ${{ steps.ver.outputs.ref }}
        run: |
          docker run --rm -e REF -v "$PWD":/w -w /w alpine:latest sh -ec '
            apk add --no-cache git make clang gcc pahole bpftool linux-headers \
              elfutils-dev libbpf-dev libffi-dev argp-standalone libxdp-dev pkgconf musl-dev
            apk add --no-cache llvm || apk add --no-cache "$(apk search -q "^llvm[0-9]*$" | sort -V | tail -n1)"
            for d in /usr/lib/llvm*/bin; do PATH="$d:$PATH"; done; export PATH
            command -v llvm-strip
            git clone --depth 1 -b "$REF" https://github.com/hack3ric/mimic src
            make -C src build-cli CHECKSUM_HACK=kprobe STRIP_BTF_EXT=1
            cp src/out/mimic "mimic-alpine-$(uname -m)"
            ls -la "mimic-alpine-$(uname -m)"
          '

      - name: publish to alpine release
        if: steps.ver.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpine
          name: alpine ${{ steps.ver.outputs.ref }}
          files: mimic-alpine-*

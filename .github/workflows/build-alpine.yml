name: build-alpine-mimic

# 在 Alpine 容器里编译 mimic 的 musl 二进制，发布到名为 alpine 的 Release，
# 供低磁盘的 Alpine 机器直接下载（无需本地 LLVM/clang 工具链）。
# 手动触发：仓库 Actions 页 -> build-alpine-mimic -> Run workflow。

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "mimic 上游分支或 tag"
        default: "master"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 在 Alpine 容器内编译（musl, 无内核模块, kprobe 校验和）
        env:
          REF: ${{ github.event.inputs.ref }}
        run: |
          docker run --rm -e REF -v "$PWD":/w -w /w alpine:latest sh -ec '
            apk add --no-cache git make clang gcc pahole bpftool linux-headers \
              elfutils-dev elfutils-static libbpf-dev libffi-dev libffi-static \
              argp-standalone libxdp-dev zlib-static musl-dev pkgconf
            git clone --depth 1 -b "$REF" https://github.com/hack3ric/mimic src
            make -C src build-cli CHECKSUM_HACK=kprobe STRIP_BTF_EXT=1 STATIC=1
            cp src/out/mimic "mimic-alpine-$(uname -m)"
          '

      - name: 发布到 alpine Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpine
          name: Alpine 预编译二进制
          files: mimic-alpine-*

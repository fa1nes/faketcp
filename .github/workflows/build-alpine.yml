name: build-alpine-mimic

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build kfunc binary and modules (lts and virt)
        run: |
          mkdir -p out
          for fl in lts virt; do
            docker run --rm -e FL="$fl" -v "$PWD/out":/out alpine:latest sh -ec '
              apk add --no-cache git make clang gcc pahole bpftool linux-headers \
                elfutils-dev elfutils-dev libbpf-dev libffi-dev argp-standalone libxdp-dev \
                pkgconf musl-dev bubblewrap linux-${FL} linux-${FL}-dev
              apk add --no-cache llvm || apk add --no-cache "$(apk search -q "^llvm[0-9]*$" | sort -V | tail -n1)"
              for d in /usr/lib/llvm*/bin; do PATH="$d:$PATH"; done; export PATH
              KVER="$(ls /lib/modules | grep -- "-${FL}" | head -n1)"
              [ -n "$KVER" ] || exit 0
              KB="/lib/modules/$KVER/build"
              git clone --depth 1 https://github.com/hack3ric/mimic src
              make -C src build-cli build-tools
              cp src/out/mimic "/out/mimic-alpine-$(uname -m)"
              [ -x "$KB/tools/bpf/resolve_btfids/resolve_btfids" ] \
                || make -C "$KB/tools/bpf/resolve_btfids" 2>/dev/null || true
              RB="$KB/tools/bpf/resolve_btfids/resolve_btfids"
              if BOOT_DIR=/boot make -C src build-kmod KERNEL_UNAME="$KVER" VMLINUX_SUFFIX="-${FL}" RESOLVE_BTFIDS="$RB"; then
                cp src/out/mimic.ko "/out/mimic-${KVER}.ko"
                echo "built module /out/mimic-${KVER}.ko"
              else
                echo "kmod build FAILED for $KVER"
              fi
            ' || true
          done
          ls -la out
          ls out/mimic-alpine-* >/dev/null 2>&1 || { echo "no binary built"; exit 1; }

      - name: publish to alpine release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpine
          name: alpine
          files: out/*

name: build-debian-mimic

on:
  workflow_dispatch:
  schedule:
    - cron: "10 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build kprobe binary (glibc)
        run: |
          docker run --rm -v "$PWD":/w -w /w debian:bookworm bash -ec '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends git make clang gcc pkg-config \
              libbpf-dev libelf-dev zlib1g-dev libxdp-dev bpftool dwarves libffi-dev ca-certificates
            git clone --depth 1 https://github.com/hack3ric/mimic src
            sed -i "s/if (padding_len > 0)/if (0)/" src/bpf/egress.c
            make -C src build-cli CHECKSUM_HACK=kprobe
            cp src/out/mimic "mimic-debian-$(uname -m)"
          '

      - name: publish to debian release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debian
          name: debian
          files: mimic-debian-*

name: build-kmod-alpine

on:
  workflow_dispatch:
  schedule:
    - cron: "40 4 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build kprobe modules
        run: |
          mkdir -p out
          for fl in lts virt; do
            docker run --rm -e FL="$fl" -v "$PWD/out":/out alpine:latest sh -ec '
              apk add --no-cache git make gcc build-base bash perl elfutils-dev \
                linux-${FL} linux-${FL}-dev
              KVER="$(ls /lib/modules | grep -- "-${FL}" | head -n1)"
              [ -n "$KVER" ] || exit 0
              git clone --depth 1 https://github.com/hack3ric/mimic src
              make -C src/kmod KERNEL_UNAME="$KVER" CHECKSUM_HACK=kprobe
              cp src/kmod/mimic.ko "/out/mimic-${KVER}.ko"
              echo "built /out/mimic-${KVER}.ko"
            ' || true
          done
          ls -la out
          ls out/*.ko >/dev/null 2>&1 || { echo "no module built"; exit 1; }

      - name: publish to kmod release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kmod
          name: kmod
          files: out/*.ko
